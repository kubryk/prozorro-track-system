<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prozorro Seraphim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="header">
            <div class="header-logo">
                <h1>Prozorro <span>Seraphim</span></h1>
            </div>
            <div class="header-actions">
                <button id="prompt-settings-btn" class="btn btn-ghost" type="button">AI промпти</button>
            </div>
            <div id="stats-bar" class="stats-bar is-loading">
                <div id="stats-loading" class="stats-loading" aria-hidden="true">
                    <span class="stats-spinner"></span>
                </div>
                <div class="stat-item">
                    <span id="stat-tenders" class="stat-value">...</span>
                    <span class="stat-label">Тендерів</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span id="stat-contracts" class="stat-value">...</span>
                    <span class="stat-label">Контрактів</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-meta">
                    <div class="meta-row">
                        <span class="meta-label">Архів з:</span>
                        <span class="meta-value">01.01.2025</span>
                    </div>
                    <div class="meta-row update-row">
                        <!-- <span class="meta-label">Оновлено:</span> -->
                        <span id="last-sync" class="meta-value">...</span>
                    </div>
                </div>
            </div>
        </header>

        <section id="search-section" class="search-section card glass">
            <div class="search-head">
                <div class="search-type-toggle">
                    <button id="toggle-tenders" class="toggle-btn active" data-type="tenders">Тендери</button>
                    <button id="toggle-contracts" class="toggle-btn" data-type="contracts">Контракти</button>
                </div>
            </div>

            <div class="search-main-row">
                <div class="smart-search-bar">
                    <div class="input-field edrpou-field">
                        <label for="edrpou">ЄДРПОУ</label>
                        <input type="text" id="edrpou" placeholder="8 або 10 цифр..." maxlength="10">
                    </div>
                    <div class="input-field role-field">
                        <label id="role-label" for="role-select">Роль</label>
                        <input type="hidden" id="role" value="customer">
                        <select id="role-select">
                            <option value="customer">Замовник</option>
                            <option value="supplier">Постачальник</option>
                        </select>
                        <div id="role-multi" class="choice-cluster hidden" role="group" aria-labelledby="role-label">
                            <button type="button" class="choice-chip active" data-group="role" data-value="customer">Замовник</button>
                            <button type="button" class="choice-chip" data-group="role" data-value="supplier">Постачальник</button>
                        </div>
                    </div>
                    <div class="input-field status-field">
                        <label id="status-label" for="status-select">Статус</label>
                        <input type="hidden" id="status" value="">
                        <select id="status-select">
                            <option value="">Всі статуси</option>
                            <option value="active">Активні</option>
                            <option value="complete">Завершені</option>
                            <option value="unsuccessful">Неуспішні</option>
                            <option value="terminated">Розірвані (контр.)</option>
                        </select>
                        <div id="status-multi" class="choice-cluster hidden" role="group" aria-labelledby="status-label"></div>
                    </div>
                    <button id="search-btn" class="btn btn-primary">Пошук</button>
                </div>
            </div>

            <div id="advanced-filters" class="advanced-filters-panel">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label for="dateType">Тип дати</label>
                        <select id="dateType">
                            <option value="dateModified">Оновлено</option>
                            <option value="dateCreated">Створено</option>
                            <option value="tenderPeriodStart">Прийом пропозицій</option>
                            <option value="enquiryPeriodStart">Період уточнень</option>
                            <option value="auctionPeriodStart">Аукціон</option>
                            <option value="awardPeriodStart">Кваліфікація</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="dateFrom">Від дати</label>
                        <input type="date" id="dateFrom">
                    </div>

                    <div class="filter-group">
                        <label for="dateTo">До дати</label>
                        <input type="date" id="dateTo">
                    </div>

                    <div class="filter-group">
                        <label for="priceFrom">Ціна від</label>
                        <input type="number" id="priceFrom" placeholder="Мінімальна">
                    </div>

                    <div class="filter-group">
                        <label for="priceTo">Ціна до</label>
                        <input type="number" id="priceTo" placeholder="Максимальна">
                    </div>
                </div>
            </div>

            <div class="active-filters-section" aria-live="polite">
                <span class="active-filters-title">Активні фільтри</span>
                <div id="active-filters" class="active-filters"></div>
                <div class="active-filters-footer">
                    <button id="clear-filters" class="btn btn-ghost" type="button">Очистити всі</button>
                </div>
            </div>
        </section>

        <section id="results-info" class="results-info">
            <div class="results-summary">
                <h2 id="results-count">Знайдено: 0</h2>
            </div>
            <div class="results-toolbar">
                <div class="sorting-row">
                    <label class="sorting-label" for="sort">Порядок у списку</label>
                    <select id="sort" class="sort-select">
                        <option value="default">Актуальні спочатку</option>
                        <option value="dateCreatedDesc">Дата: новіші</option>
                        <option value="dateCreatedAsc">Дата: старіші</option>
                        <option value="amountDesc">Сума: більші</option>
                        <option value="amountAsc">Сума: менші</option>
                    </select>
                </div>
                <div id="loading" class="loader hidden"></div>
            </div>
        </section>

        <section id="results-grid" class="results-grid">
            <!-- Cards will be injected here -->
            <div class="empty-state">
                <p>Введіть ЄДРПОУ для початку пошуку</p>
            </div>
        </section>

        <section id="contract-detail-view" class="contract-detail-view hidden"></section>
        <section id="audit-report-view" class="hidden"></section>
        <section id="prompt-settings-view" class="prompt-settings-view hidden"></section>

        <footer class="pagination hidden" id="pagination">
            <button id="prev-btn" class="btn btn-secondary">Назад</button>
            <span id="page-info">Сторінка 1</span>
            <button id="next-btn" class="btn btn-secondary">Вперед</button>
        </footer>
    </main>

    <script type="module" src="main.js"></script>
</body>

</html>
